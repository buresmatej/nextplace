# ŽÁDNÝ uživatel (user nginx;) na začátku – to je kritické!
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Přesměrování všech dočasných složek do /tmp (jediné writable místo)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Logy do /tmp, aby se Nginx nesnažil psát do /var/log/nginx
    access_log /tmp/access.log;
    error_log  /tmp/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # Školní server pravděpodobně mapuje port 80 ven
        listen 80;
        server_name localhost;

        # Cesta k tvému projektu (musí odpovídat COPY v Dockerfilu)
        root /var/www/html/www;
        index index.php index.html;

        # Nette router: všechno posílat na index.php
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # Zpracování PHP souborů
        location ~ \.php$ {
            # "php" je název tvé služby v docker-compose.yml
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # Zakázat přístup k .htaccess a dalším skrytým souborům
        location ~ /\. {
            deny all;
        }
    }
}