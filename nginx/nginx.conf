worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # KLÍČOVÉ: Vypneme ukládání dočasných souborů na disk, aby Nginx nevolal chown
    client_body_buffer_size 10M;
    client_max_body_size 10M;
    client_body_in_single_buffer on;
    client_body_temp_path off;
    proxy_temp_path off;
    fastcgi_temp_path off;
    uwsgi_temp_path off;
    scgi_temp_path off;

    # Logování do /tmp
    access_log /tmp/access.log;
    error_log  /tmp/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    server {
            listen 80;
            server_name localhost;

            # ZMĚNA: Cesta musí odpovídat WORKDIR v PHP kontejneru
            root /app/www;
            index index.php index.html;

            location / {
                try_files $uri $uri/ /index.php$is_args$args;
            }

            location ~ \.php$ {
                fastcgi_pass php:9000;
                fastcgi_index index.php;
                include fastcgi_params;
                # ZMĚNA: Tohle zajistí, že PHP dostane správnou cestu
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            }
        }
}