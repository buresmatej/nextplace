version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${PORT}:80"
    environment:
      - PORT=${PORT}
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: Dockerfile
    # Tato kombinace zajistí, že se proměnné načtou, ať už je server
    # dává do souboru .env nebo do systému
    env_file:
      - .env
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - PORT=${PORT}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: nette_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d nette_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s